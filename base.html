<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}EduStats{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --bg2: #13161e;
            --bg3: #1a1f2e;
            --surface: #1e2333;
            --surface2: #252b3d;
            --border: #2a3047;
            --border2: #344060;
            --text: #e8ecf4;
            --text2: #8b94b3;
            --text3: #5a637a;
            --accent: #4f8ef7;
            --accent2: #7c6af7;
            --green: #3ecf8e;
            --orange: #f5a623;
            --red: #e84c6a;
            --yellow: #f7d354;
            --radius: 14px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 10% 0%, rgba(79,142,247,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 100%, rgba(124,106,247,0.06) 0%, transparent 50%);
        }

        /* ─── NAVBAR ─── */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13,15,20,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 0 2rem;
            height: 58px;
        }

        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-brand span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 0.3rem;
            margin-left: auto;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text2);
            font-size: 0.88rem;
            font-weight: 500;
            padding: 0.45rem 0.9rem;
            border-radius: var(--radius-sm);
            transition: all 0.18s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--surface);
            border-color: var(--border);
        }

        .nav-link.active {
            color: var(--accent);
            background: rgba(79,142,247,0.1);
            border-color: rgba(79,142,247,0.3);
        }

        /* ─── LAYOUT ─── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* ─── CARDS ─── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .card-sm {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.1rem 1.3rem;
        }

        /* ─── GRID ─── */
        .grid { display: grid; gap: 1rem; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-5 { grid-template-columns: repeat(5, 1fr); }
        @media (max-width: 900px) {
            .grid-4, .grid-5 { grid-template-columns: repeat(2, 1fr); }
            .grid-3 { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; }
        }

        /* ─── TYPOGRAPHY ─── */
        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.7rem;
            color: var(--text);
            line-height: 1.2;
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text);
            margin-bottom: 1.1rem;
        }

        h3 {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .label-xs {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text3);
            font-weight: 500;
        }

        .value-lg {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--text);
        }

        .text-muted { color: var(--text2); font-size: 0.88rem; }

        /* ─── BUTTONS ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
            padding: 0.45rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.18s;
        }

        .btn:hover {
            color: var(--text);
            border-color: var(--border2);
            background: var(--bg3);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: #3a7de8;
            border-color: #3a7de8;
            color: #fff;
        }

        .btn-danger {
            background: rgba(232,76,106,0.12);
            color: var(--red);
            border-color: rgba(232,76,106,0.3);
        }

        .btn-danger:hover {
            background: var(--red);
            color: #fff;
        }

        /* ─── TABLE ─── */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            text-align: left;
            padding: 0.65rem 1rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text3);
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text2);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); color: var(--text); }

        .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

        /* ─── FORMS ─── */
        .form-row { margin-bottom: 1.1rem; }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text2);
            margin-bottom: 0.4rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.6rem 0.85rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.18s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .errorlist {
            list-style: none;
            color: var(--red);
            font-size: 0.82rem;
            margin-top: 0.3rem;
        }

        /* ─── BADGE ─── */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            border-radius: 99px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .badge-blue { background: rgba(79,142,247,0.15); color: var(--accent); }
        .badge-green { background: rgba(62,207,142,0.15); color: var(--green); }
        .badge-orange { background: rgba(245,166,35,0.15); color: var(--orange); }
        .badge-red { background: rgba(232,76,106,0.15); color: var(--red); }

        /* ─── DIVIDER ─── */
        .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text3);
        }

        .flex { display: flex; align-items: center; gap: 1rem; }
        .flex-between { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
        .gap-sm { gap: 0.5rem; }
        .mt-1 { margin-top: 1rem; }
        .mt-2 { margin-top: 1.5rem; }
        .mb-1 { margin-bottom: 1rem; }

        /* ─── TOPBAR FORM BUTTONS ─── */
        .topbar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.2rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'tableau-bord-statistiques' %}" class="nav-brand">
            📊 <span>Edu</span>Stats
        </a>
        <div class="nav-links">
            <a href="{% url 'tableau-bord-statistiques' %}" class="nav-link {% block nav_bord %}{% endblock %}">Tableau de bord</a>
            <a href="{% url 'gestion-index' %}" class="nav-link {% block nav_gestion %}{% endblock %}">Gestion CRUD</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
